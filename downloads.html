<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Browser - Downloads</title>
    <link rel="icon" href="icon.ico">
    <style>
        body {
            /* Устанавливаем системный шрифт без засечек */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>You can download:</h1>
    
    <div class="container">
        <iframe src="download/downloads.html" title="Downloads"></iframe>
    </div>

</body>
</html>
