<style> 
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap; /* Добавлено: позволяет элементам переноситься */
        margin: 0;
        min-height: 100vh;
        width: 100%; /* Убедимся, что body занимает всю ширину */
        box-sizing: border-box;
    }

    :root {
        --pd: 20px;
    }

    iframe {
        flex: 1 1 300px; /* Добавлено: разрешает флекс-элементам сжиматься и растягиваться, но дает базовую ширину 300px */
        height: 100%; /* Установите желаемую высоту */
        border: none;
        padding: var(--pd);
        box-sizing: border-box;
    }
</style>

<body>
    <iframe src="setup.html"></iframe> 
    <iframe src="portable.html"></iframe>
</body>
